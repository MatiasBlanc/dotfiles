format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$nodejs\
$rust\
$golang\
$php\
$java\
$cmd_duration\
$time\
\n$character
"""

# 2. El "Relleno" mÃ¡gico para alinear a la derecha
[fill]
symbol = " "

# 3. Colores de la paleta Tokyo Night Storm aplicada
# BG principal: #1f2335 | FG principal: #8089b3 | Acentos: #7aa2f7, #bb9af7, #73daca, #e0af68

[username]
show_always = true
style_user = "bg:#7aa2f7 fg:#1f2335"
format = "[î‚¶](bg:none fg:#7aa2f7)[@$user: ]($style)"

[directory]
style = "bg:#7aa2f7 fg:#1f2335"
truncation_length = 3
truncation_symbol = "./"
format = "[$path]($style)[î‚´](bg:none fg:#7aa2f7) "

[git_branch]
# Fondo PÃºrpura (#bb9af7), Texto oscuro (#1f2335)
symbol = "î‚ "
style = "bg:#bb9af7 fg:#1f2335"
format = "[î‚¶](bg:none fg:#bb9af7)[ $symbol$branch ]($style)[î‚´](bg:none fg:#bb9af7) "

[git_status]
ahead = "â‡¡"
behind = "â‡£"
diverged = "â‡•"
format = "([$ahead$behind$diverged](bold #f7768e) )" # Rojo Tokyo Night

[cmd_duration]
min_time = 2000
format = "[$duration](fg:#e0af68) " # Amarillo Tokyo Night

[time]
disabled = false
time_format = "%R"
style = "fg:#8089b3"       # Foreground base
format = "[$time]($style)"

[character]
success_symbol = "[âžœ](bold #73daca)" # Verde Tokyo Night
error_symbol = "[âœ—](bold #f7768e)"   # Rojo Tokyo Night

[custom.ia_cost]
# Fondo Amarillo (#e0af68), Texto oscuro (#1f2335)
format = "[î‚¶](bg:none fg:#e0af68)[ $output ]($style)[î‚´](bg:none fg:#e0af68) "
style = "bg:#e0af68 fg:#1f2335"
when = "test -f ~/.ia_logs/costo_actual.txt"

